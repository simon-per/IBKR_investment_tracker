services:
  traefik:
    image: traefik:v2.11
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_data:/letsencrypt
    restart: unless-stopped
    command:
      - --api.dashboard=false
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --certificatesresolvers.mytlschallenge.acme.tlschallenge=true
      - --certificatesresolvers.mytlschallenge.acme.email=user@srv1211053.hstgr.cloud
      - --certificatesresolvers.mytlschallenge.acme.storage=/letsencrypt/acme.json
    networks:
      - proxy

  portfolio-backend:
    build: .
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./portfolio.db:/app/portfolio.db
    env_file:
      - .env
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.portfolio-api.rule=Host(`portfolio.srv1211053.hstgr.cloud`) && (PathPrefix(`/api`) || Path(`/health`))
      - traefik.http.routers.portfolio-api.tls=true
      - traefik.http.routers.portfolio-api.entrypoints=websecure
      - traefik.http.routers.portfolio-api.tls.certresolver=mytlschallenge
      - traefik.http.services.portfolio-api.loadbalancer.server.port=8000
      - traefik.docker.network=proxy
    networks:
      - default
      - proxy

  portfolio-frontend:
    image: nginx:alpine
    volumes:
      - ../frontend/dist:/usr/share/nginx/html:ro
      - ./frontend-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.portfolio-frontend.rule=Host(`portfolio.srv1211053.hstgr.cloud`)
      - traefik.http.routers.portfolio-frontend.tls=true
      - traefik.http.routers.portfolio-frontend.entrypoints=websecure
      - traefik.http.routers.portfolio-frontend.tls.certresolver=mytlschallenge
      - traefik.http.services.portfolio-frontend.loadbalancer.server.port=80
      - traefik.docker.network=proxy
    networks:
      - default
      - proxy

volumes:
  traefik_data:
    external: true

networks:
  proxy:
    external: true
