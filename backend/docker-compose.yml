services:
  portfolio-backend:
    build: .
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./portfolio.db:/app/portfolio.db
    env_file:
      - .env
    restart: unless-stopped

  portfolio-frontend:
    image: nginx:alpine
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ../frontend/dist:/usr/share/nginx/html:ro
      - ./frontend-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
